name: CI

# Seven-job pipeline, matching the sibling orecchiette-* crates. No
# system libraries are needed — pure Rust DSP.
#
# Job overview:
#   test           — cargo test on Linux/macOS/Windows × stable
#   clippy_fmt     — clippy -D warnings + fmt --check on Linux stable
#   deny           — cargo-deny advisories check (RUSTSEC vulnerabilities)
#   hack           — cargo-hack feature permutations
#   machete        — cargo-machete unused dependencies
#   semver_checks  — cargo-semver-checks (advisory)
#   coverage       — cargo llvm-cov, uploaded to Codecov (Linux stable)
#
# No `miri` job: the FFT/DSP-heavy detector tests take 5+ minutes of
# CPU under Miri's interpreter even for a single test (verified
# locally) — impractical for a CI job budget.
#
# `workflow_dispatch` is enabled so the user can manually rebuild any
# job without pushing.

# Least-privilege token: no job in this workflow writes to the
# repository (flagged by CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Software Vulkan (lavapipe) so the `gpu`-feature equivalence
      # tests in tests/gpu_equivalence.rs actually exercise the wgpu
      # path here instead of only skipping via their "no adapter"
      # branch. This is necessary, not sufficient, for GPU correctness:
      # lavapipe is a different backend from the Metal path the crate
      # actually ships on — see gpu.rs's module doc comment for a case
      # where a bug only showed up on real hardware over a full-size
      # buffer.
      - name: Install Vulkan (lavapipe) drivers
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      - name: cargo test
        run: cargo test --all-features

  clippy_fmt:
    name: Clippy + Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Runs all cargo-deny checks (advisories, licenses, bans, sources)
      # based on deny.toml configuration.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  hack:
    name: cargo-hack (feature permutations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: cargo hack
        run: cargo hack check --each-feature --no-dev-deps

  machete:
    name: cargo-machete (unused dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete

      - name: cargo machete
        run: cargo machete

  semver_checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: cargo semver-checks
        run: cargo semver-checks check-release

  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo llvm-cov
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false  # coverage drop != broken build
