name: ASAN / UBSAN (FFI boundary)

# AddressSanitizer + UndefinedBehaviorSanitizer pass over the C FFI
# boundary. Runs on a nightly cron plus manual dispatch. Catches:
#   * use-after-free across the Rust↔C boundary (Miri can't see this
#     because Miri rejects FFI calls)
#   * double-free of FFI-allocated buffers / structs
#   * uninitialized reads in struct marshalling
#   * integer-overflow / shift UB in error-code translation
#
# Linux-only — the sanitizer toolchain on macOS/Windows nightlies is
# less reliable for the `-Z build-std` path we need.

on:
  schedule:
    # 05:00 UTC every Tuesday — staggered after the mutants cron so
    # the two heavy jobs don't compete for the same runner pool.
    - cron: "0 5 * * 2"
  workflow_dispatch:

jobs:
  asan:
    name: ASAN / UBSAN (C FFI boundary)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      # `rust-src` is required for `-Z build-std` to rebuild stdlib
      # with sanitizer instrumentation.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          # The asan build has a different artifact layout than the
          # regular build, so split caches to avoid cross-poisoning.
          key: asan

      - name: Install sanitizer runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm libubsan1

      - name: Run ASAN+UBSAN smoke
        run: bash tests/asan/run_asan.sh
